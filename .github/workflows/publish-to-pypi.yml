name: Publish oneDEV to PyPI

# يتفعّل تلقائيًا عند نشر Release جديد على GitHub
# أو يدويًا من تبويب Actions باستخدام "Run workflow"
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Upload existing wheel(s) from dist/ to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install twine
        run: python -m pip install --upgrade twine

      - name: Verify wheel(s) exist in dist/
        run: |
          echo "محتوى مجلد dist:"
          ls -la dist/
          if ! ls dist/*.whl 1> /dev/null 2>&1; then
            echo "❌ لا يوجد ملف .whl داخل dist/"
            exit 1
          fi

      - name: Check wheel metadata (twine check)
        run: python -m twine check dist/*.whl

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive dist/*.whl
